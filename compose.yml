include:
  - path: ./compose/compose.cw-backend.yml
    project_directory: .

services:
  floci:
    image: floci/floci:latest-compat
    ports:
      - "${FLOCI_PORT:-4566}:4566"
    env_file:
      - "compose/aws.env"
    environment:
      FLOCI_DEFAULT_REGION: eu-west-2
      FLOCI_HOSTNAME: 127.0.0.1
    volumes:
      - ./compose/floci/start.d:/etc/floci/init/start.d:ro
    # The image ships a healthcheck, but it only reports that the gateway is
    # listening - which happens before the init scripts have run. Waiting on the
    # marker the setup script writes means nothing that depends on floci starts
    # before its queues and topics exist.
    healthcheck:
      test: ["CMD", "stat", "/tmp/READY"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - cdp-tenant

  mongodb:
    image: mongo:6.0.13
    networks:
      - cdp-tenant
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    command: ["mongod", "--replSet", "mongoRepl", "--bind_ip", "0.0.0.0"]
    volumes:
      - mongodb-data:/data

  mongo-ready:
    image: mongo:6.0.13
    networks: [cdp-tenant]
    environment:
      PRIMARY: "mongodb:27017"
      REPLSET: "mongoRepl"
    volumes:
      - ./scripts/wait-for-replicaset.sh:/wait-for-replicaset.sh:ro
    entrypoint: ["/bin/bash", "/wait-for-replicaset.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh 'mongodb://mongodb:27017/?directConnection=true' --quiet --eval 'db.hello().isWritablePrimary' | grep -q true || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 60

  entra:
    image: defradigital/fg-entra-stub-frontend:0.13.0
    ports:
      - "${ENTRA_PORT:-3010}:3010"
    networks:
      - cdp-tenant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3010/jwks"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  mongodb-data:

networks:
  cdp-tenant:
    driver: bridge
    name: cdp-tenant
